name: Deploy report to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Rebuild and patch report
        shell: bash
        run: |
          mkdir -p _site
          : > _site/index.html
          for part in parts/index-*.b64; do
            base64 --decode "$part" >> _site/index.html
          done
          test "$(wc -c < _site/index.html)" -eq 3316902

          python3 - <<'PY'
          from pathlib import Path

          html_path = Path('_site/index.html')
          js_path = Path('patch-v55.js')
          html = html_path.read_text(encoding='utf-8')
          js = js_path.read_text(encoding='utf-8')
          marker = '</body>'
          payload = '<script>\n' + js + '\n</script>\n'
          if marker in html:
              html = html.replace(marker, payload + marker, 1)
          else:
              html += payload
          html_path.write_text(html, encoding='utf-8')
          Path('_site/report-v55.html').write_text(html, encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
